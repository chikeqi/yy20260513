<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>云音盒 · 个人音乐站 | 永久存储</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 头部及上传区 */
        .header {
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(120deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.3px;
        }

        .sub {
            color: #94a3b8;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .upload-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px dashed #3b82f6;
            transition: 0.2s;
        }

        .file-input-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
        }

        .file-label {
            background: #3b82f6;
            padding: 0.7rem 1.2rem;
            border-radius: 3rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: white;
        }

        .file-label:hover {
            background: #2563eb;
            transform: scale(0.97);
        }

        #fileInput {
            display: none;
        }

        .upload-status {
            color: #a5f3c3;
            font-size: 0.85rem;
            background: #0f212e;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
        }

        /* 双模式切换 */
        .mode-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            justify-content: center;
        }

        .mode-btn {
            background: #1e293b;
            border: none;
            padding: 0.5rem 1.8rem;
            border-radius: 3rem;
            font-weight: 600;
            color: #cbd5e1;
            cursor: pointer;
            transition: 0.2s;
        }

        .mode-btn.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 0 10px #3b82f6;
        }

        /* 播放器面板 */
        .player-panel {
            background: rgba(15, 25, 45, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .now-playing {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .cover-mini {
            width: 100px;
            height: 100px;
            background: #0f172a;
            border-radius: 1.5rem;
            margin-bottom: 1rem;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .song-title-player {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }

        .song-artist-player {
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        .progress-container {
            width: 100%;
            max-width: 500px;
            margin: 0.5rem 0;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #9ca3af;
        }

        .progress-bar-bg {
            background: #334155;
            height: 5px;
            border-radius: 10px;
            cursor: pointer;
            margin: 8px 0;
        }

        .progress-fill {
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            width: 0%;
            height: 100%;
            border-radius: 10px;
        }

        .ctrl-buttons {
            display: flex;
            gap: 1.8rem;
            margin-top: 1rem;
            justify-content: center;
        }

        .ctrl-btn {
            background: #1e293b;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            font-size: 1.3rem;
            color: white;
            cursor: pointer;
            transition: 0.1s;
        }

        .ctrl-btn:active {
            transform: scale(0.94);
        }

        .play-btn {
            background: #3b82f6;
            width: 60px;
            height: 60px;
            font-size: 1.7rem;
        }

        /* 音乐列表表格 */
        .music-table-wrapper {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            overflow-x: auto;
            padding: 0.2rem;
        }

        .music-table {
            width: 100%;
            border-collapse: collapse;
            color: #e2e8f0;
        }

        .music-table th, .music-table td {
            padding: 1rem 0.8rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .music-table th {
            background: #0f172a80;
            font-weight: 600;
            color: #b9d0f0;
        }

        .play-song-btn, .delete-song-btn {
            background: none;
            border: none;
            color: #60a5fa;
            cursor: pointer;
            font-weight: 600;
            margin-right: 12px;
            font-size: 0.9rem;
        }

        .delete-song-btn {
            color: #f87171;
        }

        .delete-song-btn:hover {
            text-decoration: underline;
        }

        /* 删除密码弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-card {
            background: #1e293b;
            border-radius: 2rem;
            padding: 2rem;
            width: 90%;
            max-width: 360px;
            text-align: center;
            border: 1px solid #3b82f6;
        }

        .modal-card input {
            width: 100%;
            padding: 12px;
            margin: 1rem 0;
            border-radius: 3rem;
            border: none;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .modal-card button {
            background: #3b82f6;
            border: none;
            padding: 8px 20px;
            border-radius: 2rem;
            color: white;
            margin: 5px;
            cursor: pointer;
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: #bef264;
            padding: 0.6rem 1.5rem;
            border-radius: 3rem;
            font-size: 0.8rem;
            z-index: 1100;
            display: none;
            white-space: nowrap;
        }

        @media (max-width: 640px) {
            .file-input-wrap {
                flex-direction: column;
                align-items: stretch;
            }
            .music-table th, .music-table td {
                padding: 0.75rem 0.4rem;
                font-size: 0.8rem;
            }
            .toast-msg {
                white-space: normal;
                max-width: 90%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>🎵 云音盒 · 永久音乐库</h1>
        <div class="sub">上传 MP3 → 自动加入列表 → KV 云存储 | 删除需密码 🛡️</div>
        <div class="upload-area">
            <div class="file-input-wrap">
                <label class="file-label" id="uploadLabel">📤 选择音乐文件 (MP3) 批量上传</label>
                <input type="file" id="fileInput" accept="audio/mpeg,audio/mp3" multiple>
                <span class="upload-status" id="uploadStatus">⚡ 云端保存，永久存在</span>
            </div>
            <div style="font-size:0.7rem; margin-top:10px; color:#7e8ba3;">* 支持批量上传，自动生成封面，音乐永久保存（仅你能通过密码删除）</div>
        </div>
    </div>

    <div class="mode-bar">
        <button class="mode-btn active" data-mode="all">🎧 全部循环</button>
        <button class="mode-btn" data-mode="single">🔂 单曲循环</button>
    </div>

    <div class="player-panel">
        <div class="now-playing">
            <img id="playerCover" class="cover-mini" src="https://picsum.photos/id/106/100/100" alt="cover">
            <div class="song-title-player" id="playerTitle">🎼 未选择歌曲</div>
            <div class="song-artist-player" id="playerArtist">点击列表播放</div>
            <div class="progress-container">
                <div class="time-row"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>
                <div class="progress-bar-bg" id="progressBg"><div class="progress-fill" id="progressFill"></div></div>
            </div>
            <div class="ctrl-buttons">
                <button class="ctrl-btn" id="prevBtn">⏮</button>
                <button class="ctrl-btn play-btn" id="playPauseBtn">▶</button>
                <button class="ctrl-btn" id="nextBtn">⏭</button>
            </div>
        </div>
    </div>

    <div class="music-table-wrapper">
        <table class="music-table" id="musicTable">
            <thead>
                <tr><th>#</th><th>封面</th><th>歌曲名</th><th>操作</th></tr>
            </thead>
            <tbody id="playlistBody">
                <tr><td colspan="4" style="text-align:center">✨ 加载音乐列表中... ✨</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="deleteModal" class="modal">
    <div class="modal-card">
        <h3>🔐 删除授权</h3>
        <p style="font-size:0.8rem;">此操作将永久移除音乐 (KV存储不可逆)</p>
        <input type="password" id="deletePassword" placeholder="输入删除密码" autocomplete="off">
        <div><button id="confirmDeleteBtn">确认删除</button><button id="cancelModalBtn">取消</button></div>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // ---------- 配置 ----------
    const ADMIN_PASSWORD = "music2025";   // 删除密码，可修改（与后端一致）
    let playMode = "all";                 // 'all' 列表循环, 'single' 单曲循环
    let currentPlaylist = [];             // 歌曲数组 [{id, name, artist, cover, url}]
    let currentIndex = 0;
    let audio = new Audio();
    let isPlaying = false;
    let pendingDeleteId = null;

    // ---------- 辅助函数 ----------
    function showToast(msg, time = 2500) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', time);
    }

    function formatTime(sec) {
        if (isNaN(sec)) return "0:00";
        let mins = Math.floor(sec / 60);
        let seconds = Math.floor(sec % 60);
        return `${mins}:${seconds < 10 ? '0' + seconds : seconds}`;
    }

    function updatePlayBtn() {
        const btn = document.getElementById('playPauseBtn');
        btn.innerText = isPlaying ? "⏸" : "▶";
    }

    // 加载并播放指定歌曲对象
    function loadAndPlay(song) {
        if (!song || !song.url) return;
        audio.src = song.url;
        audio.load();
        document.getElementById('playerTitle').innerText = song.name || "无标题";
        document.getElementById('playerArtist').innerText = song.artist || "云端音乐";
        document.getElementById('playerCover').src = song.cover || "https://picsum.photos/id/106/100/100";
        audio.play().then(() => {
            isPlaying = true;
            updatePlayBtn();
        }).catch(e => {
            console.warn("自动播放受限:", e);
            isPlaying = false;
            updatePlayBtn();
        });
    }

    function playSongById(id) {
        const song = currentPlaylist.find(s => s.id === id);
        if (!song) return;
        currentIndex = currentPlaylist.findIndex(s => s.id === id);
        loadAndPlay(song);
    }

    // 下一首 (根据模式)
    function nextTrack() {
        if (!currentPlaylist.length) return;
        if (playMode === "single") {
            if (audio.src) audio.currentTime = 0;
            audio.play().catch(e => console.warn);
            return;
        }
        let next = currentIndex + 1;
        if (next >= currentPlaylist.length) next = 0;
        currentIndex = next;
        loadAndPlay(currentPlaylist[currentIndex]);
    }

    function prevTrack() {
        if (!currentPlaylist.length) return;
        let prev = currentIndex - 1;
        if (prev < 0) prev = currentPlaylist.length - 1;
        currentIndex = prev;
        loadAndPlay(currentPlaylist[currentIndex]);
    }

    function togglePlay() {
        if (!audio.src && currentPlaylist.length) {
            loadAndPlay(currentPlaylist[0]);
            return;
        }
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
        } else {
            audio.play().then(() => { isPlaying = true; }).catch(() => { isPlaying = false; });
        }
        updatePlayBtn();
    }

    // ---------- API 交互 (Pages Functions) ----------
    async function fetchSongsFromKV() {
        try {
            const res = await fetch('/api/songs');
            if (res.ok) {
                const data = await res.json();
                return data.songs || [];
            } else {
                showToast("获取歌单失败", 2000);
                return [];
            }
        } catch (e) {
            showToast("无法连接服务器，请刷新", 2500);
            return [];
        }
    }

    async function uploadSongToKV(file, coverFile = null) {
        const formData = new FormData();
        formData.append("song", file);
        if (coverFile) formData.append("cover", coverFile);
        try {
            const res = await fetch('/api/upload', {
                method: "POST",
                body: formData
            });
            const data = await res.json();
            if (data.success) {
                showToast(`✅ ${data.name} 上传成功`, 2000);
                return true;
            } else {
                showToast(`上传失败: ${data.error || "未知错误"}`, 3000);
                return false;
            }
        } catch (e) {
            showToast("上传网络错误", 2000);
            return false;
        }
    }

    async function deleteSongById(songId, password) {
        try {
            const res = await fetch('/api/delete', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: songId, password: password })
            });
            const result = await res.json();
            if (result.success) {
                showToast("🗑️ 永久删除成功", 2000);
                return true;
            } else {
                showToast("删除失败: " + (result.error || "密码错误"));
                return false;
            }
        } catch (e) {
            showToast("删除请求异常", 2000);
            return false;
        }
    }

    // 渲染表格
    async function renderPlaylist(songs) {
        const tbody = document.getElementById('playlistBody');
        if (!tbody) return;
        currentPlaylist = songs.map(s => ({ ...s }));
        if (!songs.length) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">🎧 暂无音乐，点击上方上传 MP3 🎧</td></tr>';
            return;
        }
        tbody.innerHTML = "";
        songs.forEach((song, idx) => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = idx + 1;
            const coverCell = row.insertCell(1);
            const img = document.createElement('img');
            img.src = song.cover || "https://picsum.photos/id/26/40/40";
            img.style.width = "40px";
            img.style.height = "40px";
            img.style.borderRadius = "12px";
            img.style.objectFit = "cover";
            coverCell.appendChild(img);
            row.insertCell(2).innerText = song.name || "未命名曲目";
            const actionCell = row.insertCell(3);
            const playBtn = document.createElement('button');
            playBtn.innerText = "▶ 播放";
            playBtn.className = "play-song-btn";
            playBtn.onclick = () => playSongById(song.id);
            const delBtn = document.createElement('button');
            delBtn.innerText = "🗑️ 删除";
            delBtn.className = "delete-song-btn";
            delBtn.onclick = () => {
                pendingDeleteId = song.id;
                document.getElementById('deleteModal').style.display = 'flex';
            };
            actionCell.appendChild(playBtn);
            actionCell.appendChild(delBtn);
        });
    }

    // 刷新全部数据
    async function refreshAndRender() {
        const songs = await fetchSongsFromKV();
        await renderPlaylist(songs);
        if (songs.length === 0 && audio.src) {
            audio.pause();
            isPlaying = false;
            updatePlayBtn();
            audio.src = "";
        }
    }

    // 绑定音频事件 (进度条, 自动下一首)
    function bindAudioEvents() {
        const progressBg = document.getElementById('progressBg');
        const fill = document.getElementById('progressFill');
        audio.addEventListener('timeupdate', () => {
            if (audio.duration && !isNaN(audio.duration)) {
                const percent = (audio.currentTime / audio.duration) * 100;
                fill.style.width = percent + "%";
                document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
                document.getElementById('duration').innerText = formatTime(audio.duration);
            }
        });
        progressBg.addEventListener('click', (e) => {
            if (audio.duration && !isNaN(audio.duration)) {
                const rect = progressBg.getBoundingClientRect();
                const ratio = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
                audio.currentTime = ratio * audio.duration;
            }
        });
        audio.addEventListener('ended', () => {
            if (playMode === "single") {
                audio.currentTime = 0;
                audio.play().catch(e => console.warn);
            } else {
                nextTrack();
            }
        });
        audio.addEventListener('play', () => { isPlaying = true; updatePlayBtn(); });
        audio.addEventListener('pause', () => { isPlaying = false; updatePlayBtn(); });
        audio.addEventListener('error', (e) => {
            console.warn("音频错误,尝试下一首");
            if (currentPlaylist.length > 1) nextTrack();
        });
    }

    // 上传文件监听
    function bindUpload() {
        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            const uploadStatusSpan = document.getElementById('uploadStatus');
            for (let file of files) {
                if (!file.name.toLowerCase().endsWith('.mp3')) {
                    showToast(`⏭️ ${file.name} 不是MP3，已跳过`, 1500);
                    continue;
                }
                uploadStatusSpan.innerText = `⏫ 上传中: ${file.name} ...`;
                const ok = await uploadSongToKV(file, null);
                if (ok) await refreshAndRender();
            }
            uploadStatusSpan.innerText = '✅ 上传完成, 永久保存';
            setTimeout(() => { uploadStatusSpan.innerText = '⚡ 云端保存，永久存在'; }, 3000);
            fileInput.value = '';
        });
    }

    // 模式切换
    function bindModeSwitch() {
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                playMode = btn.dataset.mode;
                showToast(`播放模式: ${playMode === 'all' ? '🎵 全部循环' : '🔂 单曲循环'}`);
            });
        });
    }

    // 删除弹窗逻辑
    function bindModal() {
        const modal = document.getElementById('deleteModal');
        const confirmBtn = document.getElementById('confirmDeleteBtn');
        const cancelBtn = document.getElementById('cancelModalBtn');
        const pwdInput = document.getElementById('deletePassword');
        confirmBtn.onclick = async () => {
            const pwd = pwdInput.value;
            if (!pwd) { showToast("请输入删除密码"); return; }
            if (pwd !== ADMIN_PASSWORD) { showToast("密码错误，无法删除"); pwdInput.value = ''; return; }
            if (pendingDeleteId) {
                const success = await deleteSongById(pendingDeleteId, pwd);
                if (success) {
                    await refreshAndRender();
                    if (currentPlaylist.length === 0) {
                        audio.pause();
                        isPlaying = false;
                        audio.src = "";
                        updatePlayBtn();
                        document.getElementById('playerTitle').innerText = "🎼 未选择歌曲";
                    } else {
                        // 如果删除的是当前正在播放的歌曲，重新加载当前列表的第一首或者同索引矫正
                        if (audio.src && !currentPlaylist.find(s => s.id === pendingDeleteId)) {
                            if (currentIndex >= currentPlaylist.length) currentIndex = 0;
                            if (currentPlaylist[currentIndex]) loadAndPlay(currentPlaylist[currentIndex]);
                        }
                    }
                }
                pendingDeleteId = null;
            }
            modal.style.display = 'none';
            pwdInput.value = '';
        };
        cancelBtn.onclick = () => {
            modal.style.display = 'none';
            pendingDeleteId = null;
            pwdInput.value = '';
        };
        window.onclick = (e) => { if (e.target === modal) { modal.style.display = 'none'; pwdInput.value = ''; } };
    }

    // 控制按钮
    function bindControls() {
        document.getElementById('playPauseBtn').onclick = togglePlay;
        document.getElementById('nextBtn').onclick = nextTrack;
        document.getElementById('prevBtn').onclick = prevTrack;
    }

    // 初始化应用
    async function init() {
        bindAudioEvents();
        bindUpload();
        bindModeSwitch();
        bindModal();
        bindControls();
        await refreshAndRender();
        // 如果有歌曲且曾经没有播放，不自动播放 (等待用户点击)
        if (currentPlaylist.length && !audio.src) {
            // 预加载第一首信息但不自动播放
            console.log("音乐站就绪，点击播放或列表");
        }
    }

    init();
</script>
</body>
</html>
